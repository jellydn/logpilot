repos:
  - repo: local
    hooks:
      - id: fmt
        name: fmt
        entry: cargo fmt -- --check
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: test
        name: test
        entry: cargo test
        language: system
        pass_filenames: false
        stages: [pre-commit]
      - id: clippy
        name: clippy
        entry: cargo clippy
        language: system
        pass_filenames: false
        stages: [pre-commit]